# Release workflow for phpvm.
#
# Triggered by annotated (or lightweight) tags matching v*.
# Produces prebuilt, stripped, checksummed binaries for the supported
# platforms and attaches them (plus checksums and the installer script)
# to a GitHub Release.
#
# Asset naming (must stay in sync with install.sh):
#   phpvm-${TAG}-${TARGET}.tar.gz
#   phpvm-${TAG}-${TARGET}.tar.gz.sha256
#
# The tarball root contains only the "phpvm" binary (no extra wrapper dir).
#
# See AGENTS.md for the required local checks before tagging.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel macOS (GitHub calls the x86_64 runner "macos-13" for now)
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          # Apple Silicon macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          # Linux x86_64 (glibc 2.35+ from Ubuntu 22.04 runner)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + cross target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Run the project-mandated checks on at least the Linux job (cheap on the
      # primary runner and gives extra confidence before we publish binaries).
      - name: Verify gates (linux only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test

      - name: Strip binary
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *darwin* ]]; then
            strip -x phpvm
          else
            strip phpvm
          fi

      - name: Package archive + checksum (naming convention expected by install.sh)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          TARGET="${{ matrix.target }}"
          cd target/${{ matrix.target }}/release

          ARCHIVE_NAME="phpvm-${VER}-${TARGET}.${{ matrix.archive_ext }}"
          if [[ "${{ matrix.archive_ext }}" == "tar.gz" ]]; then
            tar -czf "../../../${ARCHIVE_NAME}" phpvm
          else
            zip "../../../${ARCHIVE_NAME}" phpvm
          fi

          cd ../../..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phpvm-${{ matrix.target }}
          path: |
            phpvm-*.${{ matrix.archive_ext }}
            phpvm-*.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}   # the v* tag so we get the exact install.sh for this release

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage installer script for the release (pinned copy)
        run: |
          # Provide the exact install.sh that was current at the tag.
          # Users can also always curl the raw URL for the tag.
          cp install.sh "phpvm-install.sh"

      - name: Create Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/phpvm-*.tar.gz
            artifacts/phpvm-*.tar.gz.sha256
            phpvm-install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Release draft created for ${{ github.ref_name }}."
          echo "Review and publish the draft at https://github.com/moyerdestroyer/phpvm/releases"
          ls -l artifacts/ || true
