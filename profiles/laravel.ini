; PHPVM profile preset: laravel
; Managed by phpvm — edit freely. Switch with `phpvm profile use laravel`.
;
; For static runtimes the common extension catalog is compiled in (see manifest).
; The extension= lines below are retained only for documentation / dynamic runtimes.
; Static builds ignore load directives; edit other directives freely.

memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
display_errors = On
error_reporting = E_ALL
; Extensions are compiled into the static binary and are not managed by profiles.
