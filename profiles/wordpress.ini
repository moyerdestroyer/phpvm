; PHPVM profile preset: wordpress
; Managed by phpvm — edit freely. Switch with `phpvm profile use wordpress`.

memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
display_errors = On
error_reporting = E_ALL

extension=curl
extension=dom
extension=gd
extension=iconv
extension=intl
extension=mbstring
extension=mysqli
extension=openssl
extension=pdo_mysql
extension=session
extension=simplexml
extension=xml
extension=zip